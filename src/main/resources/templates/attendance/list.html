<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Attendance')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="sms-content">

    <div class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>

                <h3 class="mb-0">Attendance</h3>

                <small class="text-muted">
                    Manage Student Attendance
                </small>

            </div>

            <a th:href="@{/attendance/new}"
               class="btn btn-primary">

                <i class="bi bi-plus-circle"></i>

                Mark Attendance

            </a>

        </div>

        <div class="card">

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead>

                        <tr>

                            <th>#</th>
                            <th>Date</th>
                            <th>Student</th>
                            <th>Admission No</th>
                            <th>Class</th>
                            <th>Session</th>
                            <th>Status</th>
                            <th>Remarks</th>
                            <th>Action</th>

                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="attendance,stat : ${attendanceList}">

                            <td th:text="${stat.count}"></td>

                            <td th:text="${attendance.attendanceDate}"></td>

                            <td th:text="${attendance.student.fullName}"></td>

                            <td th:text="${attendance.student.admissionNo}"></td>

                            <td th:text="${attendance.classroom.name}"></td>

                            <td th:text="${attendance.academicSession.sessionName}"></td>

                            <td>

                                <span class="badge bg-success"
                                      th:if="${attendance.status.name()=='PRESENT'}">

                                    Present

                                </span>

                                <span class="badge bg-danger"
                                      th:if="${attendance.status.name()=='ABSENT'}">

                                    Absent

                                </span>

                                <span class="badge bg-warning text-dark"
                                      th:if="${attendance.status.name()=='LEAVE'}">

                                    Leave

                                </span>

                            </td>

                            <td th:text="${attendance.remarks}"></td>

                            <td>

                                <a th:href="@{/attendance/delete/{id}(id=${attendance.id})}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Delete Attendance ?')">

                                    <i class="bi bi-trash"></i>

                                </a>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>

</html>
