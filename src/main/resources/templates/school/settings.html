<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('School Settings')}"></head>

<body>

    <!-- ==========================
        Navbar
=========================== -->

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- ==========================
        Sidebar
=========================== -->

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- ==========================
        Main Content
=========================== -->

    <main class="sms-content">

        <div class="container-fluid">

            <!-- ==========================
                Page Header
        =========================== -->

            <div class="sms-page-header mb-4">

                <div>

                    <h2 class="sms-page-title">

                        <i class="bi bi-gear-fill me-2"></i>

                        School Settings

                    </h2>

                    <p class="text-secondary mb-0">

                        Manage your school information and system configuration.

                    </p>

                </div>

                <div>

                    <button class="btn btn-primary sms-btn">

                        <i class="bi bi-check-circle me-2"></i>

                        Save Changes

                    </button>

                </div>

            </div>

            <form th:action="@{/settings/save}" th:object="${setting}" method="post">

                <div class="row g-4">

                    <!-- ===================================
                        Basic Information
                ==================================== -->

                    <div class="col-lg-6">

                        <div class="sms-card h-100">

                            <h5 class="mb-4">

                                <i class="bi bi-building me-2"></i>

                                Basic Information

                            </h5>

                            <div class="mb-3">

                                <label class="form-label">

                                    School Name

                                </label>

                                <input type="text" class="form-control" th:field="*{schoolName}"
                                    placeholder="ABC Public School">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    School Code

                                </label>

                                <input type="text" class="form-control" th:field="*{schoolCode}" placeholder="ABC001">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    Tagline

                                </label>

                                <input type="text" class="form-control" th:field="*{tagline}"
                                    placeholder="Learn • Grow • Succeed">

                            </div>

                            <div>

                                <label class="form-label">

                                    Registration Number

                                </label>

                                <input type="text" class="form-control" th:field="*{registrationNumber}"
                                    placeholder="Registration Number">

                            </div>

                        </div>

                    </div>

                    <!-- ===================================
                        Contact Information
                ==================================== -->

                    <div class="col-lg-6">

                        <div class="sms-card h-100">

                            <h5 class="mb-4">

                                <i class="bi bi-telephone-fill me-2"></i>

                                Contact Information

                            </h5>

                            <div class="mb-3">

                                <label class="form-label">

                                    Mobile Number

                                </label>

                                <input type="text" class="form-control" th:field="*{phone}"
                                    placeholder="+91 9876543210">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    Alternate Number

                                </label>

                                <input type="text" class="form-control" th:field="*{alternatePhone}">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    Email

                                </label>

                                <input type="email" class="form-control" th:field="*{email}"
                                    placeholder="school@gmail.com">

                            </div>

                            <div>

                                <label class="form-label">

                                    Website

                                </label>

                                <input type="text" class="form-control" th:field="*{website}"
                                    placeholder="www.school.com">

                            </div>

                        </div>

                    </div>

                    <!-- ===================================
                        Address
                ==================================== -->

                    <div class="col-lg-6">

                        <div class="sms-card h-100">

                            <h5 class="mb-4">

                                <i class="bi bi-geo-alt-fill me-2"></i>

                                Address

                            </h5>

                            <div class="mb-3">

                                <label class="form-label">

                                    Address

                                </label>

                                <textarea class="form-control" rows="4" th:field="*{address}">
                            </textarea>

                            </div>

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">

                                        City

                                    </label>

                                    <input type="text" class="form-control" th:field="*{city}">

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">

                                        State

                                    </label>

                                    <input type="text" class="form-control" th:field="*{state}">

                                </div>

                                <div class="col-md-6">

                                    <label class="form-label">

                                        Country

                                    </label>

                                    <input type="text" class="form-control" th:field="*{country}">

                                </div>

                                <div class="col-md-6">

                                    <label class="form-label">

                                        Pin Code

                                    </label>

                                    <input type="text" class="form-control" th:field="*{pinCode}">

                                </div>

                            </div>

                        </div>

                    </div>
                    <!-- ===================================
                        Academic Information
                ==================================== -->

                    <div class="col-lg-6">

                        <div class="sms-card h-100">

                            <h5 class="mb-4">

                                <i class="bi bi-mortarboard-fill me-2"></i>

                                Academic Information

                            </h5>

                            <div class="mb-3">

                                <label class="form-label">
                                    Academic Session
                                </label>

                                <input type="text" class="form-control" th:field="*{academicSession}"
                                    placeholder="2026-2027">

                            </div>

                            <div>

                                <label class="form-label">
                                    Principal Name
                                </label>

                                <input type="text" class="form-control" th:field="*{principalName}"
                                    placeholder="Principal Name">

                            </div>

                        </div>

                    </div>



                    <!-- ===================================
                        Branding
                ==================================== -->

                    <div class="col-lg-6">

                        <div class="sms-card h-100">

                            <h5 class="mb-4">

                                <i class="bi bi-image-fill me-2"></i>

                                Branding

                            </h5>

                            <div class="text-center mb-4">

                                <img th:src="${setting.logoPath != null ? setting.logoPath : '/images/logo.png'}"
                                    class="img-thumbnail rounded-circle"
                                    style="width:120px;height:120px;object-fit:cover;">

                                <p class="mt-3 mb-2 fw-semibold">

                                    School Logo

                                </p>

                                <input type="file" class="form-control">

                            </div>

                            <hr>

                            <div class="text-center">

                                <img th:src="${setting.faviconPath != null ? setting.faviconPath : '/images/favicon.png'}"
                                    class="img-thumbnail" style="width:60px;height:60px;">

                                <p class="mt-3 mb-2 fw-semibold">

                                    Favicon

                                </p>

                                <input type="file" class="form-control">

                            </div>

                        </div>

                    </div>



                    <!-- ===================================
                        Social Media
                ==================================== -->

                    <div class="col-lg-6">

                        <div class="sms-card h-100">

                            <h5 class="mb-4">

                                <i class="bi bi-share-fill me-2"></i>

                                Social Media

                            </h5>

                            <div class="mb-3">

                                <label class="form-label">

                                    Facebook

                                </label>

                                <input type="text" class="form-control" th:field="*{facebook}">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    Instagram

                                </label>

                                <input type="text" class="form-control" th:field="*{instagram}">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    Twitter (X)

                                </label>

                                <input type="text" class="form-control" th:field="*{twitter}">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    YouTube

                                </label>

                                <input type="text" class="form-control" th:field="*{youtube}">

                            </div>

                            <div>

                                <label class="form-label">

                                    LinkedIn

                                </label>

                                <input type="text" class="form-control" th:field="*{linkedin}">

                            </div>

                        </div>

                    </div>



                    <!-- ===================================
                        System Settings
                ==================================== -->

                    <div class="col-lg-6">

                        <div class="sms-card h-100">

                            <h5 class="mb-4">

                                <i class="bi bi-sliders me-2"></i>

                                System Settings

                            </h5>

                            <div class="mb-3">

                                <label class="form-label">

                                    Currency

                                </label>

                                <input type="text" class="form-control" th:field="*{currency}">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    Currency Symbol

                                </label>

                                <input type="text" class="form-control" th:field="*{currencySymbol}">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    Time Zone

                                </label>

                                <input type="text" class="form-control" th:field="*{timeZone}">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    Date Format

                                </label>

                                <input type="text" class="form-control" th:field="*{dateFormat}">

                            </div>

                            <div>

                                <label class="form-label">

                                    Theme

                                </label>

                                <select class="form-select" th:field="*{theme}">

                                    <option value="dark">

                                        Dark

                                    </option>

                                    <option value="light">

                                        Light

                                    </option>

                                </select>

                            </div>

                        </div>

                    </div>
                    <!-- ===================================
                        Footer Settings
                ==================================== -->

                    <div class="col-lg-12">

                        <div class="sms-card">

                            <h5 class="mb-4">

                                <i class="bi bi-layout-text-sidebar-reverse me-2"></i>

                                Footer Settings

                            </h5>

                            <div class="row">

                                <div class="col-lg-6 mb-3">

                                    <label class="form-label">

                                        Footer Text

                                    </label>

                                    <textarea class="form-control" rows="4" th:field="*{footerText}">
                                </textarea>

                                </div>

                                <div class="col-lg-6 mb-3">

                                    <label class="form-label">

                                        Copyright Text

                                    </label>

                                    <textarea class="form-control" rows="4" th:field="*{copyrightText}">
                                </textarea>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- ==========================
                    Bottom Buttons
            =========================== -->

                <div class="row mt-4">

                    <div class="col-12">

                        <div class="sms-card">

                            <div class="d-flex justify-content-end gap-2 flex-wrap">

                                <button type="reset" class="btn btn-outline-secondary">

                                    <i class="bi bi-arrow-counterclockwise me-2"></i>

                                    Reset

                                </button>

                                <button type="submit" class="btn btn-primary sms-btn">

                                    <i class="bi bi-check-circle-fill me-2"></i>

                                    Save Settings

                                </button>

                            </div>

                        </div>

                    </div>

                </div>

            </form>

        </div>

    </main>

    <!-- ==========================
        Footer
=========================== -->

    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- ==========================
        Scripts
=========================== -->

    <div th:replace="~{fragments/scripts :: scripts}"></div>

    <!-- ==========================
        Success Message
=========================== -->

    <th:block th:if="${success}">

        <script>

            window.addEventListener("load", function () {

                alert("[[${success}]]");

            });

        </script>

    </th:block>

</body>

</html>
