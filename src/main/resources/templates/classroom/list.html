<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="sms-content">

    <div class="container-fluid">

        <!-- Page Header -->

        <div class="sms-page-header mb-4">

            <div>

                <h2 class="sms-page-title">

                    <i class="bi bi-building me-2"></i>

                    Class Rooms

                </h2>

                <p class="text-secondary mb-0">

                    Manage all school classes.

                </p>

            </div>

            <a th:href="@{/classes/add}"
               class="btn btn-primary">

                <i class="bi bi-plus-circle me-2"></i>

                Add Class

            </a>

        </div>

        <!-- Search -->

        <div class="sms-card mb-4">

            <div class="row">

                <div class="col-md-4">

                    <input
                            type="text"
                            class="form-control"
                            id="searchInput"
                            placeholder="Search Class...">

                </div>

            </div>

        </div>

        <!-- Table -->

        <div class="sms-card">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead>

                    <tr>

                        <th>#</th>

                        <th>Class</th>

                        <th>Section</th>

                        <th>Code</th>

                        <th>Room</th>

                        <th>Capacity</th>

                        <th>Status</th>

                        <th width="170">

                            Action

                        </th>

                    </tr>

                    </thead>

                    <tbody id="classTable">

                    <tr th:each="item,stat : ${classes}">

                        <td th:text="${stat.count}"></td>

                        <td th:text="${item.className}"></td>

                        <td th:text="${item.section}"></td>

                        <td th:text="${item.classCode}"></td>

                        <td th:text="${item.roomNumber}"></td>

                        <td th:text="${item.capacity}"></td>

                        <td>

                            <span
                                    th:if="${item.active}"
                                    class="badge bg-success">

                                Active

                            </span>

                            <span
                                    th:unless="${item.active}"
                                    class="badge bg-danger">

                                Inactive

                            </span>

                        </td>

                        <td>

                            <a
                                    th:href="@{'/classes/edit/' + ${item.id}}"
                                    class="btn btn-sm btn-warning">

                                <i class="bi bi-pencil"></i>

                            </a>

                            <a
                                    th:href="@{'/classes/delete/' + ${item.id}}"
                                    class="btn btn-sm btn-danger"
                                    onclick="return confirm('Delete this class?')">

                                <i class="bi bi-trash"></i>

                            </a>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(classes)}">

                        <td colspan="8"
                            class="text-center py-5">

                            <i class="bi bi-inbox display-4"></i>

                            <br><br>

                            No Class Found

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>

    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("keyup", function () {

        let filter = this.value.toLowerCase();

        let rows = document.querySelectorAll("#classTable tr");

        rows.forEach(row => {

            row.style.display =
                row.innerText.toLowerCase().includes(filter)
                    ? ""
                    : "none";

        });

    });

</script>

</body>

</html>
