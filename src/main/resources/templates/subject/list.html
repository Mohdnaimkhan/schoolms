<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="sms-content">

    <div class="container-fluid">

        <!-- Page Header -->

        <div class="sms-page-header mb-4">

            <div>

                <h2 class="sms-page-title">

                    <i class="bi bi-book-half me-2"></i>

                    Subjects

                </h2>

                <p class="text-secondary mb-0">

                    Manage all school subjects.

                </p>

            </div>

            <a th:href="@{/subjects/add}"
               class="btn btn-primary">

                <i class="bi bi-plus-circle me-2"></i>

                Add Subject

            </a>

        </div>

        <!-- Search -->

        <div class="sms-card mb-4">

            <div class="row">

                <div class="col-md-4">

                    <input type="text"
                           id="searchInput"
                           class="form-control"
                           placeholder="Search Subject...">

                </div>

            </div>

        </div>

        <!-- Table -->

        <div class="sms-card">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead>

                    <tr>

                        <th>#</th>
                        <th>Subject</th>
                        <th>Code</th>
                        <th>Class</th>
                        <th>Section</th>
                        <th>Status</th>
                        <th width="170">Action</th>

                    </tr>

                    </thead>

                    <tbody id="subjectTable">

                    <tr th:each="item,stat : ${subjects}">

                        <td th:text="${stat.count}"></td>

                        <td th:text="${item.subjectName}"></td>

                        <td th:text="${item.subjectCode}"></td>

                        <td th:text="${item.classRoom.className}"></td>

                        <td th:text="${item.classRoom.section}"></td>

                        <td>

                            <span class="badge bg-success"
                                  th:if="${item.active}">

                                Active

                            </span>

                            <span class="badge bg-danger"
                                  th:unless="${item.active}">

                                Inactive

                            </span>

                        </td>

                        <td>

                            <a th:href="@{'/subjects/edit/' + ${item.id}}"
                               class="btn btn-warning btn-sm">

                                <i class="bi bi-pencil"></i>

                            </a>

                            <a th:href="@{'/subjects/delete/' + ${item.id}}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this subject?')">

                                <i class="bi bi-trash"></i>

                            </a>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(subjects)}">

                        <td colspan="7"
                            class="text-center py-5">

                            <i class="bi bi-inbox display-5"></i>

                            <br><br>

                            No Subject Found

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<div th:replace="~{fragments/scripts :: scripts}"></div>

<script>

    document.getElementById("searchInput")
        .addEventListener("keyup", function () {

            let value = this.value.toLowerCase();

            document.querySelectorAll("#subjectTable tr")
                .forEach(row => {

                    row.style.display =
                        row.innerText.toLowerCase().includes(value)
                            ? ""
                            : "none";

                });

        });

</script>

</body>

</html>
