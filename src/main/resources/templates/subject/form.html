<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="sms-content">

    <div class="container-fluid">

        <!-- Page Header -->

        <div class="sms-page-header mb-4">

            <div>

                <h2 class="sms-page-title"
                    th:text="${subject.id == null ? 'Add Subject' : 'Edit Subject'}">
                    Add Subject
                </h2>

                <p class="text-secondary mb-0">
                    Create or update subject information.
                </p>

            </div>

            <a th:href="@{/subjects}"
               class="btn btn-outline-secondary">

                <i class="bi bi-arrow-left me-2"></i>

                Back

            </a>

        </div>

        <!-- Form Card -->

        <div class="sms-card">

            <form th:action="@{/subjects/save}"
                  th:object="${subject}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <div class="row g-4">

                    <!-- Subject Name -->

                    <div class="col-md-6">

                        <label class="form-label">

                            Subject Name
                            <span class="text-danger">*</span>

                        </label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{subjectName}"
                                placeholder="Mathematics">

                        <small class="text-danger"
                               th:errors="*{subjectName}">
                        </small>

                    </div>

                    <!-- Subject Code -->

                    <div class="col-md-6">

                        <label class="form-label">

                            Subject Code

                        </label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{subjectCode}"
                                placeholder="MATH">

                    </div>

                    <!-- Class -->

                    <div class="col-md-6">

                        <label class="form-label">

                            Class
                            <span class="text-danger">*</span>

                        </label>

                        <select class="form-select"
                                th:field="*{classRoom}">

                            <option value="">

                                Select Class

                            </option>

                            <option
                                    th:each="cls : ${classes}"
                                    th:value="${cls.id}"
                                    th:text="${cls.className + ' - ' + cls.section}">
                            </option>

                        </select>

                    </div>

                    <!-- Status -->

                    <div class="col-md-6">

                        <label class="form-label">

                            Status

                        </label>

                        <select class="form-select"
                                th:field="*{active}">

                            <option th:value="true">

                                Active

                            </option>

                            <option th:value="false">

                                Inactive

                            </option>

                        </select>

                    </div>

                    <!-- Description -->

                    <div class="col-12">

                        <label class="form-label">

                            Description

                        </label>

                        <textarea
                                rows="4"
                                class="form-control"
                                th:field="*{description}"
                                placeholder="Subject Description">
                        </textarea>

                    </div>

                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-end gap-2">

                    <a th:href="@{/subjects}"
                       class="btn btn-outline-secondary">

                        Cancel

                    </a>

                    <button type="submit"
                            class="btn btn-primary">

                        <i class="bi bi-check-circle me-2"></i>

                        <span th:text="${subject.id == null ? 'Save Subject' : 'Update Subject'}"></span>

                    </button>

                </div>

            </form>

        </div>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>

</html>
