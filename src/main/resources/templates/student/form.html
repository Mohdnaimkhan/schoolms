<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Student Admission')}"></head>

<body>

    <!-- Navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- ===============================
         Main Content
    ================================ -->

    <main class="sms-content">

        <div class="container-fluid">

            <!-- Page Header -->

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h3 class="fw-bold mb-1">

                        <i class="bi bi-person-vcard-fill text-primary me-2"></i>

                        Student Admission

                    </h3>

                    <p class="text-secondary mb-0">

                        Add / Edit Student Information

                    </p>

                </div>

                <a th:href="@{/students}" class="btn btn-outline-secondary">

                    <i class="bi bi-arrow-left-circle me-1"></i>

                    Back

                </a>

            </div>

            <!-- ===============================
                 Student Form
            ================================ -->

            <form th:action="@{/students/save}" th:object="${student}" method="post" enctype="multipart/form-data"
                novalidate>

                <input type="hidden" th:field="*{id}">

                <!-- =====================================
                     Admission Information
                ====================================== -->

                <!-- ==========================================================
     Admission Information
========================================================== -->

                <div class="card shadow-sm  mb-4">

                    <div class="card-header fw-bold">



                        <i class="bi bi-mortarboard-fill me-2"></i>

                        Admission Information



                    </div>

                    <div class="card-body p-4">

                        <div class="row g-4">

                            <!-- Admission No -->

                            <div class="col-lg-6">

                                <label class="form-label fw-semibold">

                                    Admission Number

                                </label>

                                <input type="text" th:field="*{admissionNo}" class="form-control" readonly>

                            </div>

                            <!-- Roll Number -->

                            <div class="col-lg-6">

                                <label class="form-label fw-semibold">

                                    Roll Number

                                </label>

                                <input type="text" th:field="*{rollNumber}" class="form-control" readonly>

                            </div>

                            <!-- Academic Session -->

                            <div class="col-lg-6">

                                <label class="form-label fw-semibold">

                                    Academic Session

                                    <span class="text-danger">*</span>

                                </label>

                                <select th:field="*{academicSession}" class="form-select required"
                                    th:classappend="${#fields.hasErrors('academicSession')} ? 'is-invalid' : ''">

                                    <option value="">

                                        Select Academic Session

                                    </option>

                                    <option th:each="s : ${academicSessions}" th:value="${s.id}"
                                        th:text="${s.sessionName}">
                                    </option>

                                </select>

                                <div class="invalid-feedback" th:errors="*{academicSession}">
                                </div>

                            </div>

                            <!-- Class -->

                            <div class="col-lg-6">

                                <label class="form-label fw-semibold">

                                    Class

                                    <span class="text-danger">*</span>

                                </label>

                                <select th:field="*{classRoom}" class="form-select required"
                                    th:classappend="${#fields.hasErrors('classRoom')} ? 'is-invalid' : ''">

                                    <option value="">

                                        Select Class

                                    </option>

                                    <option th:each="room : ${classRooms}" th:value="${room.id}"
                                        th:text="${room.className}">
                                    </option>

                                </select>

                                <div class="invalid-feedback" th:errors="*{classRoom}">
                                </div>

                            </div>

                            <!-- Admission Date -->

                            <div class="col-lg-4">

                                <label class="form-label fw-semibold">

                                    Admission Date

                                    <span class="text-danger">*</span>

                                </label>

                                <input type="date" th:field="*{admissionDate}"
                                    th:value="${#temporals.format(student.admissionDate,'yyyy-MM-dd')}"
                                    class="form-control required"
                                    th:classappend="${#fields.hasErrors('admissionDate')} ? 'is-invalid' : ''">

                                <div class="invalid-feedback" th:errors="*{admissionDate}">
                                </div>

                            </div>

                            <!-- Admission Type -->

                            <div class="col-lg-4">

                                <label class="form-label fw-semibold">

                                    Admission Type

                                    <span class="text-danger">*</span>

                                </label>

                                <select th:field="*{admissionType}" class="form-select required"
                                    th:classappend="${#fields.hasErrors('admissionType')} ? 'is-invalid' : ''">

                                    <option value="">

                                        Select Admission Type

                                    </option>

                                    <option th:each="type : ${admissionTypes}" th:value="${type}" th:text="${type}">
                                    </option>

                                </select>

                                <div class="invalid-feedback" th:errors="*{admissionType}">
                                </div>

                            </div>

                            <!-- Status -->

                            <div class="col-lg-4">

                                <label class="form-label fw-semibold">

                                    Student Status

                                    <span class="text-danger">*</span>

                                </label>

                                <select th:field="*{status}" class="form-select required"
                                    th:classappend="${#fields.hasErrors('status')} ? 'is-invalid' : ''">

                                    <option value="">

                                        Select Status

                                    </option>

                                    <option th:each="status : ${studentStatuses}" th:value="${status}"
                                        th:text="${status}">
                                    </option>

                                </select>

                                <div class="invalid-feedback" th:errors="*{status}">
                                </div>

                            </div>

                        </div>

                    </div>

                </div>



                <!-- =====================================
     Student Information
====================================== -->

                <div class="card shadow-sm mb-4">

                    <div class="card-header fw-bold">

                        <i class="bi bi-person-fill me-2"></i>

                        Student Information

                    </div>

                    <div class="card-body">

                        <div class="row g-4">

                            <!-- ==========================
                 Student Photo
            ========================== -->

                            <div class="col-lg-3">

                                <label class="form-label fw-semibold">

                                    Student Photo

                                </label>

                                <div class="text-center">

                                    <img id="photoPreview" th:src="${student.photo != null}
                         ? @{/uploads/students/{img}(img=${student.photo})}
                         : @{/images/no-image.png}" class="img-thumbnail mb-3"
                                        style="width:180px;height:220px;object-fit:cover;">

                                    <input type="file" id="photoFile" name="photoFile" accept="image/*"
                                        class="form-control">

                                    <small class="text-muted">

                                        JPG, PNG (Max 2 MB)

                                    </small>

                                </div>

                            </div>

                            <!-- ==========================
                 Student Details
            ========================== -->

                            <div class="col-lg-9">

                                <div class="row g-3">

                                    <!-- Student Name -->

                                    <div class="col-lg-8">

                                        <label class="form-label">

                                            Student Name
                                            <span class="text-danger">*</span>

                                        </label>

                                        <input type="text" th:field="*{fullName}"
                                            class="form-control name-input required" maxlength="150"
                                            th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"
                                            placeholder="Enter Student Name">

                                        <div class="invalid-feedback" th:errors="*{fullName}">
                                        </div>

                                    </div>

                                    <!-- Gender -->

                                    <div class="col-lg-4">

                                        <label class="form-label">

                                            Gender
                                            <span class="text-danger">*</span>

                                        </label>

                                        <select th:field="*{gender}" class="form-select required"
                                            th:classappend="${#fields.hasErrors('gender')} ? 'is-invalid' : ''">

                                            <option value="">

                                                Select Gender

                                            </option>

                                            <option th:each="gender : ${genders}" th:value="${gender}"
                                                th:text="${gender}">
                                            </option>

                                        </select>

                                        <div class="invalid-feedback" th:errors="*{gender}">
                                        </div>

                                    </div>

                                    <!-- Date of Birth -->

                                    <div class="col-lg-6">

                                        <label class="form-label">

                                            Date of Birth
                                            <span class="text-danger">*</span>

                                        </label>

                                        <input type="date"
                                            th:value="${#temporals.format(student.dateOfBirth,'yyyy-MM-dd')}"
                                            th:field="*{dateOfBirth}" class="form-control required"
                                            th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid' : ''">

                                        <div class="invalid-feedback" th:errors="*{dateOfBirth}">
                                        </div>

                                    </div>

                                    <!-- Blood Group -->

                                    <div class="col-lg-6">

                                        <label class="form-label">

                                            Blood Group

                                        </label>

                                        <select th:field="*{bloodGroup}" class="form-select">

                                            <option value="">

                                                Select Blood Group

                                            </option>

                                            <option th:each="bg : ${bloodGroups}" th:value="${bg}" th:text="${bg}">
                                            </option>

                                        </select>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- =====================================
     Parent Information
     (Next Part)
====================================== -->
                <!-- =====================================
     Parent Information
====================================== -->

                <div class="card shadow-sm mb-4">

                    <div class="card-header fw-bold">

                        <i class="bi bi-people-fill me-2"></i>

                        Parent Information

                    </div>

                    <div class="card-body">

                        <div class="row g-3">

                            <!-- Father Name -->

                            <div class="col-lg-4 col-md-6">

                                <label class="form-label">

                                    Father Name
                                    <span class="text-danger">*</span>

                                </label>

                                <input type="text" th:field="*{fatherName}" class="form-control name-input required"
                                    th:classappend="${#fields.hasErrors('fatherName')} ? 'is-invalid' : ''"
                                    maxlength="150" placeholder="Enter Father Name">

                                <div class="invalid-feedback" th:errors="*{fatherName}">
                                </div>

                            </div>

                            <!-- Mother Name -->

                            <div class="col-lg-4 col-md-6">

                                <label class="form-label">

                                    Mother Name

                                </label>

                                <input type="text" th:field="*{motherName}" class="form-control name-input"
                                    maxlength="150" placeholder="Enter Mother Name">

                                <div class="invalid-feedback" th:errors="*{motherName}">
                                </div>

                            </div>

                            <!-- Mobile Number -->

                            <div class="col-lg-4 col-md-6">

                                <label class="form-label">

                                    Mobile Number

                                </label>

                                <input type="text" id="mobile" th:field="*{mobile}"
                                    class="form-control mobile-input duplicate-check" maxlength="11"
                                    th:classappend="${#fields.hasErrors('mobile')} ? 'is-invalid' : ''"
                                    placeholder="98765 43210" data-check-url="/students/check/mobile"
                                    th:attr="data-id=*{id}">

                                <div class="invalid-feedback" th:errors="*{mobile}">
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- =====================================
     Contact Information
     (Next Part)
====================================== -->
                <!-- =====================================
     Contact Information
====================================== -->

                <div class="card shadow-sm mb-4">

                    <div class="card-header fw-bold">

                        <i class="bi bi-telephone-fill me-2"></i>

                        Contact Information

                    </div>

                    <div class="card-body">

                        <div class="row g-3">

                            <!-- Email -->

                            <div class="col-lg-6 col-md-6">

                                <label class="form-label">

                                    Email Address

                                </label>

                                <input type="email" th:field="*{email}" class="form-control email-input "
                                    th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" maxlength="100"
                                    placeholder="example@gmail.com" th:attr="data-id=*{id}">

                                <div class="invalid-feedback" th:errors="*{email}">
                                </div>

                            </div>

                            <!-- Address -->

                            <div class="col-lg-6 col-md-6">

                                <label class="form-label">

                                    Address

                                </label>

                                <textarea th:field="*{address}" class="form-control" rows="3" maxlength="500"
                                    placeholder="Enter Full Address"></textarea>

                                <div class="invalid-feedback" th:errors="*{address}">
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- =====================================
     Other Information
     (Next Part)
====================================== -->
                <!-- =====================================
     Other Information
====================================== -->

                <div class="card shadow-sm mb-4">

                    <div class="card-header fw-bold">

                        <i class="bi bi-card-checklist me-2"></i>

                        Other Information

                    </div>

                    <div class="card-body">

                        <div class="row g-3">

                            <!-- Aadhaar Number -->

                            <div class="col-lg-4 col-md-6">

                                <label class="form-label">

                                    Aadhaar Number

                                </label>

                                <input type="text" th:field="*{aadharNumber}"
                                    class="form-control aadhaar-input duplicate-check" maxlength="14"
                                    th:classappend="${#fields.hasErrors('aadharNumber')} ? 'is-invalid' : ''"
                                    placeholder="1234 5678 9012" data-check-url="/students/check/aadhaar"
                                    th:attr="data-id=*{id}">

                                <div class="invalid-feedback" th:errors="*{aadharNumber}">
                                </div>

                            </div>

                            <!-- Religion -->

                            <div class="col-lg-4 col-md-6">

                                <label class="form-label">

                                    Religion

                                </label>

                                <select th:field="*{religion}" class="form-select">

                                    <option value="">

                                        Select Religion

                                    </option>

                                    <option th:each="religion : ${religions}" th:value="${religion}"
                                        th:text="${religion}">
                                    </option>

                                </select>

                            </div>

                            <!-- Category -->

                            <div class="col-lg-4 col-md-6">

                                <label class="form-label">

                                    Category

                                </label>

                                <select th:field="*{category}" class="form-select">

                                    <option value="">

                                        Select Category

                                    </option>

                                    <option th:each="category : ${categories}" th:value="${category}"
                                        th:text="${category}">
                                    </option>

                                </select>

                            </div>

                            <!-- Remarks -->

                            <div class="col-12">

                                <label class="form-label">

                                    Remarks

                                </label>

                                <textarea th:field="*{remarks}" class="form-control" rows="4" maxlength="500"
                                    placeholder="Enter Remarks (Optional)">
                </textarea>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- =====================================
     Form Buttons
====================================== -->

                <div class="card shadow-sm">

                    <div class="card-body">

                        <div class="d-flex justify-content-end gap-2 flex-wrap">

                            <a th:href="@{/students}" class="btn btn-outline-secondary">

                                <i class="bi bi-arrow-left-circle me-1"></i>

                                Back

                            </a>

                            <button type="reset" class="btn btn-warning">

                                <i class="bi bi-arrow-counterclockwise me-1"></i>

                                Reset

                            </button>

                            <button type="submit" class="btn btn-primary">

                                <i class="bi bi-check-circle me-1"></i>

                                Save Student

                            </button>

                        </div>

                    </div>

                </div>

            </form>

        </div>

    </main>

    <!-- Footer -->

    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- Scripts -->

    <div th:replace="~{fragments/scripts :: scripts}"></div>

</body>

</html>
