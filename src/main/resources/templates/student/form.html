<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Student Admission')}"></head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="sms-content">

        <div class="container-fluid">

            <!-- Page Header -->

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>
                    <h3 class="fw-bold mb-0">
                        <i class="bi bi-person-vcard-fill text-primary"></i>
                        Student Admission
                    </h3>
                    <small class="text-muted">
                        Add / Edit Student Information
                    </small>
                </div>

                <a th:href="@{/students}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i>
                    Back
                </a>

            </div>

            <!-- Form -->

            <form th:action="@{/students/save}" th:object="${student}" method="post" enctype="multipart/form-data">

                <input type="hidden" th:field="*{id}" />

                <!-- ==========================
                 Admission Details
            =========================== -->

                <div class="card shadow-sm mb-4">

                    <div class="card-header fw-bold">
                        <i class="bi bi-mortarboard-fill me-2"></i>
                        Admission Details
                    </div>

                    <div class="card-body">

                        <div class="row g-3">

                            <div class="col-md-3">

                                <label class="form-label">
                                    Admission No
                                </label>

                                <input type="text" th:field="*{admissionNo}" class="form-control" readonly>

                            </div>

                            <div class="col-md-3">

                                <label class="form-label">
                                    Roll Number
                                </label>

                                <input type="text" th:field="*{rollNumber}" class="form-control" readonly>

                            </div>

                            <div class="col-md-3">

                                <label class="form-label">
                                    Academic Session
                                    <span class="text-danger">*</span>
                                </label>

                                <select class="form-select" th:field="*{academicSession}">

                                    <option value="">
                                        Select Session
                                    </option>

                                    <option th:each="s : ${academicSessions}" th:value="${s.id}"
                                        th:text="${s.sessionName}">
                                    </option>

                                </select>

                            </div>

                            <div class="col-md-3">

                                <label class="form-label">
                                    Class
                                    <span class="text-danger">*</span>
                                </label>

                                <select class="form-select" th:field="*{classRoom}">

                                    <option value="">
                                        Select Class
                                    </option>

                                    <option th:each="cls : ${classRooms}" th:value="${cls.id}"
                                        th:text="${cls.className}">
                                    </option>

                                </select>

                            </div>

                            <div class="col-md-3">

                                <label class="form-label">
                                    Admission Date
                                    <span class="text-danger"></span>

                                </label>

                                <input type="date" class="form-control" th:field="*{admissionDate}">
                                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('admissionDate')}"
                                    th:errors="*{admissionDate}">
                                </div>

                            </div>

                            <div class="col-md-3">

                                <label class="form-label">
                                    Admission Type
                                </label>

                                <select class="form-select" th:field="*{admissionType}">

                                    <option th:each="type : ${admissionTypes}" th:value="${type}" th:text="${type}">
                                    </option>

                                </select>

                            </div>

                            <div class="col-md-3">

                                <label class="form-label">
                                    Status
                                </label>

                                <select class="form-select" th:field="*{status}">

                                    <option th:each="status : ${studentStatuses}" th:value="${status}"
                                        th:text="${status}">
                                    </option>

                                </select>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- ==========================
                 Student Details
            =========================== -->

                <div class="card shadow-sm mb-4">

                    <div class="card-header fw-bold">
                        <i class="bi bi-person-fill me-2"></i>
                        Student Details
                    </div>

                    <div class="card-body">

                        <div class="row">

                            <!-- Left -->

                            <div class="col-lg-9">

                                <div class="row g-3">

                                    <div class="col-md-6">

                                        <label class="form-label">
                                            Full Name
                                            <span class="text-danger">*</span>
                                        </label>

                                        <input type="text" class="form-control" th:field="*{fullName}"
                                            placeholder="Enter Full Name">

                                    </div>

                                    <div class="col-md-3">

                                        <label class="form-label">
                                            Gender
                                        </label>

                                        <select class="form-select" th:field="*{gender}">

                                            <option value="">
                                                Select
                                            </option>

                                            <option th:each="g : ${genders}" th:value="${g}" th:text="${g}">
                                            </option>

                                        </select>

                                    </div>

                                    <div class="col-md-3">

                                        <label class="form-label">
                                            Date of Birth
                                        </label>

                                        <input type="date" class="form-control" th:field="*{dateOfBirth}">

                                    </div>

                                    <div class="col-md-3">

                                        <label class="form-label">
                                            Blood Group
                                        </label>
                                        <select th:field="*{bloodGroup}" class="form-select">
                                            <option value="">Select Blood Group</option>
                                            <option th:each="bg : ${bloodGroups}" th:value="${bg}"
                                                th:text="${bg.displayName}">
                                            </option>
                                        </select>

                                    </div>

                                </div>

                            </div>

                            <!-- Right Photo -->

                            <div class="col-lg-3">

                                <div class="text-center">

                                    <img id="photoPreview"
                                        th:src="${student.photo!=null} ? @{'/uploads/students/' + ${student.photo}} : @{/images/no-image.png}"
                                        class="img-thumbnail mb-3" style="width:120px;height:150px;object-fit:cover;">

                                    <input type="file" class="form-control" id="photoFile" name="photoFile"
                                        accept="image/*">

                                </div>

                            </div>

                        </div>

                    </div>

                </div>
                <!-- ==========================
                 Parent Details
            =========================== -->

                <div class="card shadow-sm mb-4">

                    <div class="card-header fw-bold">
                        <i class="bi bi-people-fill me-2"></i>
                        Parent Details
                    </div>

                    <div class="card-body">

                        <div class="row g-3">

                            <div class="col-md-4">

                                <label class="form-label">
                                    Father Name
                                    <span class="text-danger">*</span>
                                </label>

                                <input type="text" class="form-control" th:field="*{fatherName}"
                                    placeholder="Enter Father Name">

                            </div>

                            <div class="col-md-4">

                                <label class="form-label">
                                    Mother Name
                                </label>

                                <input type="text" class="form-control" th:field="*{motherName}"
                                    placeholder="Enter Mother Name">

                            </div>

                            <div class="col-md-4">

                                <label class="form-label">
                                    Mobile Number
                                    <span class="text-danger">*</span>
                                </label>

                                <input type="text" class="form-control" maxlength="10" th:field="*{mobile}"
                                    placeholder="Enter Mobile Number">

                            </div>

                        </div>

                    </div>

                </div>

                <!-- ==========================
                 Contact Details
            =========================== -->

                <div class="card shadow-sm mb-4">

                    <div class="card-header fw-bold">
                        <i class="bi bi-telephone-fill me-2"></i>
                        Contact Details
                    </div>

                    <div class="card-body">

                        <div class="row g-3">

                            <div class="col-md-6">

                                <label class="form-label">
                                    Email Address
                                </label>

                                <input type="email" class="form-control" th:field="*{email}"
                                    placeholder="Enter Email Address">

                            </div>

                            <div class="col-md-6">

                                <label class="form-label">
                                    Address
                                </label>

                                <textarea class="form-control" rows="3" th:field="*{address}"
                                    placeholder="Enter Full Address"></textarea>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- ==========================
                 Other Details
            =========================== -->

                <div class="card shadow-sm mb-4">

                    <div class="card-header fw-bold">
                        <i class="bi bi-info-circle-fill me-2"></i>
                        Other Details
                    </div>

                    <div class="card-body">

                        <div class="row g-3">

                            <div class="col-md-3">

                                <label class="form-label">
                                    Aadhaar Number
                                </label>

                                <input type="text" class="form-control" maxlength="12" th:field="*{aadharNumber}"
                                    placeholder="Enter Aadhaar Number">

                            </div>

                            <div class="col-md-3">

                                <label class="form-label">
                                    Religion
                                </label>

                                <select th:field="*{religion}" class="form-select">
                                    <option value="">Select Religion</option>
                                    <option th:each="religion : ${religions}" th:value="${religion}"
                                        th:text="${religion.displayName}">
                                    </option>
                                </select>

                            </div>

                            <div class="col-md-3">

                                <label class="form-label">
                                    Category
                                </label>

                                Category
                                <select th:field="*{category}" class="form-select">
                                    <option value="">Select Category</option>
                                    <option th:each="category : ${categories}" th:value="${category}"
                                        th:text="${category.displayName}">
                                    </option>
                                </select>

                            </div>

                            <div class="col-md-3 d-flex align-items-end">

                                <div class="form-check form-switch">

                                    <input class="form-check-input" type="checkbox" th:field="*{active}">

                                    <label class="form-check-label">
                                        Active Student
                                    </label>

                                </div>

                            </div>

                            <div class="col-md-12">

                                <label class="form-label">
                                    Remarks
                                </label>

                                <textarea class="form-control" rows="4" th:field="*{remarks}"
                                    placeholder="Remarks"></textarea>

                            </div>

                        </div>

                    </div>

                </div>
                <!-- ==========================
                 Form Buttons
            =========================== -->

                <div class="card shadow-sm">

                    <div class="card-body text-center">

                        <button type="submit" class="btn btn-primary me-2">
                            <i class="bi bi-check-circle"></i>
                            Save
                        </button>

                        <button type="reset" class="btn btn-warning me-2">
                            <i class="bi bi-arrow-clockwise"></i>
                            Reset
                        </button>

                        <a th:href="@{/students}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i>
                            Back
                        </a>

                    </div>

                </div>

            </form>

        </div>

    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <div th:replace="~{fragments/scripts :: scripts}"></div>

    <script>

        const photoInput = document.getElementById('photoFile');
        const photoPreview = document.getElementById('photoPreview');

        photoInput.addEventListener('change', function () {

            const file = this.files[0];

            if (file) {

                photoPreview.src = URL.createObjectURL(file);

            }

        });

    </script>

</body>

</html>
