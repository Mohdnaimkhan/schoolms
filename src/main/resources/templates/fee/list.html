<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Fee Management')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="sms-content">

    <div class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
                <h3 class="mb-1">Fee Management</h3>
                <p class="text-muted mb-0">
                    Manage Student Fee Records
                </p>
            </div>

            <a th:href="@{/fees/new}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-2"></i>
                Add Fee
            </a>

        </div>

        <div class="card">

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead>

                        <tr>

                            <th>Receipt</th>
                            <th>Student</th>
                            <th>Fee Type</th>
                            <th>Total</th>
                            <th>Paid</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th width="120">Action</th>

                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="fee : ${feeList}">

                            <td th:text="${fee.receiptNo}"></td>

                            <td th:text="${fee.student.fullName}"></td>

                            <td th:text="${fee.feeType}"></td>

                            <td th:text="${fee.amount}"></td>

                            <td th:text="${fee.paidAmount}"></td>

                            <td th:text="${fee.status}"></td>

                            <td th:text="${fee.paymentDate}"></td>

                            <td>

                                <a class="btn btn-sm btn-warning"
                                   th:href="@{/fees/edit/{id}(id=${fee.id})}">

                                    <i class="bi bi-pencil"></i>

                                </a>

                                <a class="btn btn-sm btn-danger"
                                   th:href="@{/fees/delete/{id}(id=${fee.id})}">

                                    <i class="bi bi-trash"></i>

                                </a>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>

</html>
