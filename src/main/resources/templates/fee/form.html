<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Fee Form')}"></head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="sms-content">

        <!-- Page Header -->

        <div class="sms-page-header">

            <div>

                <h2 class="sms-page-title">

                    Fee Collection

                </h2>

                <div class="sms-breadcrumb">

                    Dashboard / Fees / Form

                </div>

            </div>

        </div>

        <!-- Card -->

        <div class="card shadow-sm border-0">

            <div class="card-header">

                <h5 class="mb-0">

                    Fee Details

                </h5>

            </div>

            <div class="card-body">

                <!-- YAHAN POORA FORM AAYEGA -->

                <form th:action="@{/fees/save}" th:object="${fee}" method="post">

                    <input type="hidden" th:field="*{id}">

                    <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Receipt No
                                </label>

                                <input type="text" class="form-control" th:field="*{receiptNo}" required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Payment Date
                                </label>

                                <input type="date" class="form-control" th:field="*{paymentDate}">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Student
                                </label>

                                <select class="form-select" th:field="*{student}" required>

                                    <option value="">
                                        Select Student
                                    </option>

                                    <option th:each="student : ${students}" th:value="${student.id}"
                                        th:text="${student.fullName}">
                                    </option>

                                </select>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Academic Session
                                </label>

                                <select class="form-select" th:field="*{academicSession}" required>

                                    <option value="">
                                        Select Session
                                    </option>

                                    <option th:each="s : ${academic}" th:value="${s.id}"
                                        th:text="${s.sessionName}">
                                    </option>

                                </select>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Fee Type
                                </label>

                                <input type="text" class="form-control" th:field="*{feeType}">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Status
                                </label>

                                <select class="form-select" th:field="*{status}">

                                    <option th:each="status : ${T(com.naim.school.fee.FeeStatus).values()}"
                                        th:value="${status}" th:text="${status}">
                                    </option>

                                </select>

                            </div>

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Amount
                                </label>

                                <input type="number" step="0.01" class="form-control" th:field="*{amount}">

                            </div>

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Paid Amount
                                </label>

                                <input type="number" step="0.01" class="form-control" th:field="*{paidAmount}">

                            </div>

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Due Amount
                                </label>

                                <input type="number" step="0.01" class="form-control" th:field="*{dueAmount}" readonly>

                            </div>

                            <div class="col-12 mb-3">

                                <label class="form-label">
                                    Remarks
                                </label>

                                <textarea class="form-control" rows="3" th:field="*{remarks}">
            </textarea>

                            </div>

                        </div>

                        <div class="text-end">

                            <a th:href="@{/fees}" class="btn btn-secondary">

                                Back

                            </a>

                            <button type="reset" class="btn btn-warning">

                                Reset

                            </button>

                            <button type="submit" class="btn btn-primary">

                                Save

                            </button>

                        </div>

                    </div>
                </form>

            </div>

        </div>

    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <div th:replace="~{fragments/scripts :: scripts}"></div>

</body>

</html>
